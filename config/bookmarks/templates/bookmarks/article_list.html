<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks</title>
</head>
<body>
    <h1>My Bookmarks</h1>
    {% for article in articles %}
        <h2><a href="{{ article.url }}">{{ article.title }}</a></h2>
        <p>Tags:
            {% for tag in article.tags.all %}
                <span> {{ tag.name }} </span>
            {% endfor %}
        </p>
        {% endfor %}
</body>
</html>
